# ============================================
# ESPORTS TOURNAMENT PLATFORM - CONFIG
# ============================================

# Server Port
server.port=8080

# ============================================
# DATABASE CONFIG - MySQL Workbench
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/esports_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================
# JWT CONFIG
# ============================================
app.jwt.secret=EsportsTournamentSecretKeyForJWTTokenGeneration2024VeryLongKey
app.jwt.expiration=86400000

# ============================================
# CORS
# ============================================
app.cors.allowed-origins=http://localhost:3000
